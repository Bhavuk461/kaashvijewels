name: Deploy to GitHub Pages

# Build and publish the Vite site to GitHub Pages.
# Pages Source must be set to "GitHub Actions" (Settings -> Pages).
#
# Triggers:
#   - push to master (runs for direct commits on GitHub)
#   - workflow_dispatch: manual "Run workflow" fallback. GitHub does not
#     auto-run on:push for commits arriving via a repository mirror, so this
#     button guarantees you can always deploy.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissions required by the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
