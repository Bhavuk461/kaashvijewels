name = "kaashvi-payments"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Secrets are NOT stored here. Set them with:
#   wrangler secret put RAZORPAY_KEY_ID
#   wrangler secret put RAZORPAY_KEY_SECRET
#   wrangler secret put RAZORPAY_WEBHOOK_SECRET
#   wrangler secret put APPS_SCRIPT_URL
#   wrangler secret put APPS_SCRIPT_TOKEN
#
# ALLOWED_ORIGIN is the public URL of your frontend (e.g. https://krishnahaha27-group.github.io)
[vars]
ALLOWED_ORIGIN = "https://krishnahaha27-group.github.io"
