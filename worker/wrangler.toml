name = "kaashvi-admin-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Secrets (set via `wrangler secret put`):
#   ADMIN_PASSWORD_HASH  — SHA-256 hex digest of the admin password
#   JWT_SECRET           — HMAC-SHA256 signing key for tokens

[[kv_namespaces]]
binding = "PRODUCT_OVERRIDES"
id = "e23c0ce903554bd5828cd8bd78183181"

[[kv_namespaces]]
binding = "ORDERS"
id = "333a9733edb74de1806e0d439fd89b94"

[[r2_buckets]]
binding = "PRODUCT_IMAGES"
bucket_name = "kaashvi-product-images"

[vars]
R2_PUBLIC_URL = "https://images.thekaashvijewels.com"
